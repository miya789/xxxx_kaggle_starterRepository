# Reference config: Akkadian → English translation (ByT5-base + Adafactor)
# Based on expB05 Adafactor (GeoMean 28.10, +3.23 vs AdamW baseline)

model:
  name: "google/byt5-base"
  max_source_length: 512
  max_target_length: 512
  num_beams: 8
  length_penalty: 1.3
  max_new_tokens: 512

preprocessing:
  logo_replacement: false

training:
  epochs: 15
  batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 1.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.1
  max_grad_norm: 1.0
  label_smoothing: 0.1
  optimizer: adafactor
  bidirectional: false
  rdrop_alpha: 0
  fp16: false
  eval_steps_per_epoch: 1
  eval_start_epoch: 12
  patience: 5
  num_workers: 8

seed: 42

cv:
  n_folds: 5
  stratify: true
  folds_csv: "workspace/fold/v1_stratified_len/folds.csv"

data_augmentation:
  augmented_csv: "data/augmented_train.csv"

experiment:
  name: "byt5_adafactor_v1"

paths:
  train_csv: "datasets/train.csv"
  test_csv: "datasets/test.csv"
  sample_submission_csv: "datasets/sample_submission.csv"
  output_dir: "results"

logging:
  log_every_n_steps: 10
  save_total_limit: 2
